name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  prechecks:
    name: Formatting, lint and docs
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v5
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy
    - uses: dtolnay/rust-toolchain@nightly
      with:
        components: rustfmt
    - uses: Swatinem/rust-cache@v2
    - name: Check formatting
      run: cargo +nightly fmt --check --verbose
    - name: Lint debug
      run: cargo +stable clippy --all-targets --all-features -- -D warnings
    - name: Lint release
      run: cargo +stable clippy --release --all-targets --all-features -- -D warnings
    - name: Build docs
      run: cargo +nightly doc --lib --no-deps --all-features --document-private-items
      env:
        RUSTDOCFLAGS: --cfg docsrs -Dwarnings
    - name: Run doctests
      run: cargo test --doc

  checks:
    name: Build and run tests
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v5
    - uses: dtolnay/rust-toolchain@stable
    - uses: Swatinem/rust-cache@v2
    - name: Run tests
      run: cargo test --all-targets --all-features
    - name: Build release
      run: cargo build --release --all-targets --verbose